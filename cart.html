<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart | ForkFeed</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .cart-container {
            max-width: 1100px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .cart-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 40px;
            align-items: start;
        }

        .cart-card {
            background: rgba(17, 17, 17, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 35px;
            border-radius: 28px;
        }

        .cart-table {
            width: 100%;
            border-collapse: collapse;
        }

        .cart-table th {
            text-align: left;
            color: var(--text-gray);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .cart-table td {
            padding: 25px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .cart-item-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .cart-item-img {
            width: 90px;
            height: 70px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .item-details h3 {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .item-details p {
            font-size: 12px;
            color: var(--text-gray);
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #1a1a1a;
            width: fit-content;
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid #333;
        }

        .qty-btn {
            background: transparent;
            border: none;
            color: var(--white);
            cursor: pointer;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: 0.2s;
        }

        .qty-btn:hover {
            color: var(--primary-pink);
        }

        .qty-val {
            font-weight: 700;
            min-width: 20px;
            text-align: center;
        }

        .remove-btn {
            background: rgba(255, 77, 77, 0.1);
            color: #ff4d4d;
            border: none;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .remove-btn:hover {
            background: #ff4d4d;
            color: white;
        }

        .summary-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 24px;
            position: sticky;
            top: 100px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .summary-row span:first-child {
            color: var(--text-gray);
        }

        .summary-total {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 20px;
            font-weight: 800;
        }

        @media (max-width: 950px) {
            .cart-grid {
                grid-template-columns: 1fr;
            }

            .summary-card {
                position: static;
            }
        }
    </style>
</head>

<body>
    <div class="grid-background"></div>
    <header>
        <nav class="navbar">
            <div class="logo">Fork<span>Feed</span></div>
            <ul class="nav-links">
                <li><a href="home.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="orders.html">Orders</a></li>
                <li><a href="about.html">About us</a></li>
            </ul>
            <div class="nav-actions">
                <div class="cart-icon">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span class="cart-count">0</span>
                </div>
                <button class="btn-signup" id="nav-auth-btn" onclick="window.location.href='signup.html'">Sign Up</button>
                <button class="btn-signup" id="nav-logout-btn" style="display: none; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">Logout</button>
            </div>
        </nav>
    </header>

    <main class="cart-container">
        <h1 style="margin-bottom: 30px;">Your Culinary <span class="text-pink">Basket</span></h1>

        <div id="cart-content-wrapper" class="cart-grid">
            <div class="cart-card">
                <table class="cart-table">
                    <thead>
                        <tr>
                            <th>Delicacy</th>
                            <th>Quantity</th>
                            <th>Subtotal</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="cart-items-body">
                        <!-- Items will be injected here -->
                    </tbody>
                </table>
            </div>

            <div class="summary-card">
                <h2 style="margin-bottom: 25px;">Order Summary</h2>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal">Rs.0.00</span>
                </div>
                <div class="summary-row">
                    <span>Delivery Fee</span>
                    <span style="color: #4cd137;">FREE</span>
                </div>
                <div class="summary-row summary-total">
                    <span>Total</span>
                    <span id="total" class="text-pink">Rs.0.00</span>
                </div>
                <button class="btn-primary auth-btn" id="place-order-btn"
                    style="margin-top: 30px; width: 100%; justify-content: center; padding: 18px;">
                    Confirm & Place Order
                </button>
                <p style="text-align: center; font-size: 12px; color: var(--text-gray); margin-top: 15px;">
                    <i class="fa-solid fa-shield-halved"></i> Secure checkout powered by FoodSquare
                </p>
            </div>
        </div>

        <div id="empty-cart-msg" style="display: none; text-align: center; padding: 80px 20px;">
            <i class="fa-solid fa-bag-shopping" style="font-size: 60px; color: #1a1a1a; margin-bottom: 20px;"></i>
            <h2>Your cart is as empty as a desert.</h2>
            <p style="color: var(--text-gray); margin: 15px 0 30px;">Let's find something delicious for you!</p>
            <button class="btn-primary" onclick="window.location.href='menu.html'" style="margin: 0 auto;">Browse
                Menu</button>
        </div>
    </main>

    <script type="module">
        import cart from './js/cart.js';
        import api from './js/api.js';

        // Login enforcement
        const token = sessionStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
        }

        api.setupNavbar();

        const itemsBody = document.getElementById('cart-items-body');
        const totalEl = document.getElementById('total');
        const subtotalEl = document.getElementById('subtotal');
        const placeOrderBtn = document.getElementById('place-order-btn');
        const cartGrid = document.getElementById('cart-content-wrapper');
        const emptyMsg = document.getElementById('empty-cart-msg');

        function renderCart() {
            if (cart.items.length === 0) {
                cartGrid.style.display = 'none';
                emptyMsg.style.display = 'block';
                return;
            }

            cartGrid.style.display = 'grid';
            emptyMsg.style.display = 'none';
            itemsBody.innerHTML = '';

            cart.items.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>
                        <div class="cart-item-info">
                            <img src="${item.image || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=200'}" class="cart-item-img">
                            <div class="item-details">
                                <h3>${item.name}</h3>
                                <p>Rs.${item.price.toFixed(2)} each</p>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div class="quantity-controls">
                            <button class="qty-btn minus" data-id="${item.id}"><i class="fa-solid fa-minus" style="font-size:12px"></i></button>
                            <span class="qty-val">${item.quantity}</span>
                            <button class="qty-btn plus" data-id="${item.id}"><i class="fa-solid fa-plus" style="font-size:12px"></i></button>
                        </div>
                    </td>
                    <td><span style="font-weight: 700;">Rs.${(item.price * item.quantity).toFixed(2)}</span></td>
                    <td style="text-align: right;">
                        <button class="remove-btn" data-id="${item.id}"><i class="fa-solid fa-trash-can"></i></button>
                    </td>
                `;
                itemsBody.appendChild(row);
            });

            totalEl.textContent = `Rs.${cart.getTotal().toFixed(2)}`;
            subtotalEl.textContent = `Rs.${cart.getTotal().toFixed(2)}`;
        }

        itemsBody.addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;

            const id = parseInt(btn.dataset.id);
            if (!id) return;

            if (btn.classList.contains('plus')) cart.updateQuantity(id, 1);
            else if (btn.classList.contains('minus')) cart.updateQuantity(id, -1);
            else if (btn.classList.contains('remove-btn')) cart.removeItem(id);

            renderCart();
        });

        placeOrderBtn.addEventListener('click', async () => {
            if (cart.items.length === 0) return;

            const token = sessionStorage.getItem('token');
            if (!token) {
                alert('Please login to place an order');
                window.location.href = 'login.html';
                return;
            }

            try {
                placeOrderBtn.disabled = true;
                placeOrderBtn.textContent = 'Processing...';

                const orderData = {
                    totalPrice: cart.getTotal(),
                    orderItems: cart.items.map(item => ({
                        foodId: item.id,
                        foodName: item.name,
                        price: item.price,
                        quantity: item.quantity
                    }))
                };

                await api.placeOrder(orderData);
                alert('Success! Your order has been placed.');
                cart.clear();
                window.location.href = 'orders.html';
            } catch (error) {
                alert('Order failed: ' + error.message);
                placeOrderBtn.disabled = false;
                placeOrderBtn.textContent = 'Confirm & Place Order';
            }
        });

        renderCart();

        // Update Nav button if logged in
        const username = sessionStorage.getItem('username');
        if (username) {
            document.getElementById('nav-btn').textContent = 'Profile';
        }
    </script>
</body>

</html>
