<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ForkFeed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-message {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 16px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .auth-message.success {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.4);
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .auth-message.error {
            background: rgba(255, 45, 85, 0.15);
            border: 1px solid rgba(255, 45, 85, 0.4);
            color: #ff6b8a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .admin-hint {
            background: rgba(255, 45, 85, 0.08);
            border: 1px solid rgba(255, 45, 85, 0.2);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 13px;
            color: var(--text-gray);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .admin-hint strong {
            color: var(--primary-pink);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="grid-background"></div>

    <header>
        <nav class="navbar">
            <div class="logo">Fork<span>Feed</span></div>
            <ul class="nav-links">
                <li><a href="home.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="orders.html">Orders</a></li>
                <li><a href="about.html">About us</a></li>
            </ul>
            <div class="nav-actions">
                <div class="cart-icon">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span class="cart-count">0</span>
                </div>
                <button class="btn-signup" onclick="window.location.href='signup.html'">Sign Up</button>
            </div>
        </nav>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Welcome <span class="text-pink">Back!</span></h2>
                <p>Please enter your details to login.</p>
            </div>

            <!-- Feedback message -->
            <div class="auth-message" id="auth-msg"></div>

            <form class="auth-form" id="login-form">
                <div class="input-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="login-username" placeholder="Enter your username" required
                            autocomplete="username">
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="login-password" placeholder="••••••••" required
                            autocomplete="current-password">
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-pass">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-primary auth-btn" id="login-btn">Login to Account</button>
            </form>

            <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up for free</a></p>
        </div>
    </main>

    <script type="module">
        import api from './js/api.js';

        const form = document.getElementById('login-form');
        const msgEl = document.getElementById('auth-msg');
        const loginBtn = document.getElementById('login-btn');

        function showMsg(type, icon, text) {
            msgEl.className = `auth-message ${type}`;
            msgEl.innerHTML = `<i class="fa-solid ${icon}"></i> ${text}`;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;

            if (!username || !password) {
                showMsg('error', 'fa-circle-exclamation', 'Please fill in all fields.');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Logging in...';

            try {
                await api.login(username, password);
                const profile = await api.getUserProfile(username);

                showMsg('success', 'fa-circle-check', 'Login successful! Redirecting...');

                setTimeout(() => {
                    if (profile.roles && profile.roles.includes('ROLE_ADMIN')) {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'home.html';
                    }
                }, 800);
            } catch (error) {
                showMsg('error', 'fa-circle-xmark', error.message || 'Invalid username or password.');
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Login to Account';
            }
        });
    </script>
</body>

</html>
