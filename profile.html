<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | ForkFeed</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-container {
            max-width: 900px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .profile-card {
            background: rgba(17, 17, 17, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 50px;
            border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 35px;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 40px;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--primary-pink), #e02475);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 35% 65% 65% 35% / 35% 35% 65% 65%;
            font-size: 3.5rem;
            font-weight: 800;
            box-shadow: 0 15px 30px rgba(255, 45, 85, 0.3);
        }

        .profile-header h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .profile-header p {
            color: var(--text-gray);
            font-size: 16px;
        }

        .profile-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .profile-field {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: 0.3s;
        }

        .profile-field:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .profile-field label {
            display: block;
            color: var(--text-gray);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .profile-field p {
            font-size: 17px;
            font-weight: 600;
            color: var(--white);
        }

        .order-summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: rgba(255, 45, 85, 0.05);
            border: 1px solid rgba(255, 45, 85, 0.1);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            transition: 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 45, 85, 0.08);
        }

        .stat-card h3 {
            font-size: 2.5rem;
            color: var(--primary-pink);
            font-weight: 800;
            margin-bottom: 5px;
        }

        .stat-card p {
            color: var(--text-gray);
            font-weight: 600;
            font-size: 14px;
        }

        .logout-btn {
            margin-top: 40px;
            width: 100%;
            padding: 18px;
            background: transparent;
            color: #ff4d4d;
            border: 2px solid #ff4d4d;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logout-btn:hover {
            background: #ff4d4d;
            color: white;
            box-shadow: 0 10px 20px rgba(255, 77, 77, 0.2);
        }

        @media (max-width: 600px) {
            .profile-details {
                grid-template-columns: 1fr;
            }

            .profile-header {
                flex-direction: column;
                text-align: center;
            }

            .order-summary-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="grid-background"></div>
    <header>
        <nav class="navbar">
            <div class="logo">Fork<span>Feed</span></div>
            <ul class="nav-links">
                <li><a href="home.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="orders.html">Orders</a></li>
                <li><a href="about.html">About us</a></li>
            </ul>
            <div class="nav-actions">
                <button class="btn-signup" id="nav-auth-btn" onclick="window.location.href='signup.html'">Sign Up</button>
                <button class="btn-signup" id="nav-logout-btn" style="display: none; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">Logout</button>
                <div class="cart-icon" onclick="window.location.href='cart.html'" style="cursor: pointer;">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span class="cart-count">0</span>
                </div>
            </div>
        </nav>
    </header>

    <main class="profile-container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar" id="avatar-initial">?</div>
                <div>
                    <h1 id="top-name">Loading...</h1>
                    <p id="top-email">Fetching profile...</p>
                </div>
            </div>

            <div class="profile-details">
                <!-- Details will be injected here -->
            </div>

            <h2 style="margin-bottom: 20px; font-size: 20px;">Order <span class="text-pink">Insights</span></h2>
            <div class="order-summary-grid">
                <!-- Stats will be injected here -->
            </div>

            <button class="logout-btn" id="logout-btn">
                <i class="fa-solid fa-right-from-bracket"></i> Sign Out
            </button>
        </div>
    </main>

    <script type="module" src="./js/profile.js"></script>
    <script type="module">
        import api from './js/api.js';

        document.getElementById('logout-btn').addEventListener('click', () => {
            if (confirm('Are you sure you want to sign out?')) {
                api.logout();
            }
        });

        // Update avatar and name from localStorage immediately for zero-flicker
        const username = sessionStorage.getItem('username');
        if (username) {
            document.getElementById('avatar-initial').textContent = username[0].toUpperCase();
            document.getElementById('top-name').textContent = username;
        } else {
            window.location.href = 'login.html';
        }
    </script>
</body>

</html>
