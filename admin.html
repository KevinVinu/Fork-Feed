<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | ForkFeed</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            padding: 40px var(--gutter);
            margin-top: 20px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .admin-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 15px;
            width: fit-content;
        }

        .tab-btn {
            padding: 12px 25px;
            border: none;
            background: transparent;
            color: var(--text-gray);
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--primary-pink);
            color: white;
            box-shadow: 0 5px 15px rgba(255, 45, 85, 0.3);
        }

        .admin-section {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .admin-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stat-card i {
            font-size: 24px;
            color: var(--primary-pink);
        }

        .stat-val {
            font-size: 28px;
            font-weight: 800;
        }

        .stat-label {
            color: var(--text-gray);
            font-size: 14px;
        }

        /* Order Management List */
        .admin-orders-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .admin-order-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .order-row-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 15px;
        }

        .cust-info h3 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .cust-info p {
            color: var(--text-gray);
            font-size: 13px;
        }

        .order-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-select-wrapper {
            position: relative;
        }

        .status-select {
            background: #1a1a1a;
            color: white;
            border: 1px solid #333;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            appearance: none;
            padding-right: 35px;
        }

        .status-select-wrapper::after {
            content: "\f107";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-gray);
            pointer-events: none;
        }

        /* Menu Management */
        .mgmt-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
        }

        .mgmt-form-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 24px;
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .form-title {
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
        }

        .form-title i {
            color: var(--primary-pink);
        }

        .mgmt-items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .mgmt-food-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .mgmt-food-img {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            object-fit: cover;
        }

        .mgmt-food-info {
            flex-grow: 1;
        }

        .mgmt-food-info h4 {
            font-size: 15px;
            margin-bottom: 4px;
        }

        .mgmt-food-info p {
            font-size: 12px;
            color: var(--text-gray);
        }

        .mgmt-food-price {
            color: var(--primary-pink);
            font-weight: 700;
            font-size: 14px;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--primary-pink);
        }

        input:checked+.slider:before {
            transform: translateX(20px);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .mgmt-grid {
                grid-template-columns: 1fr;
            }

            .mgmt-form-card {
                position: static;
            }
        }
    </style>
</head>

<body>
    <div class="grid-background"></div>

    <header>
        <nav class="navbar">
            <div class="logo">Fork<span>Feed</span> <span class="badge-top"
                    style="margin-left: 10px; font-size: 10px;">ADMIN</span></div>
            <ul class="nav-links">
                <li><a href="home.html">User View</a></li>
                <li><a href="admin.html" class="active">Dashboard</a></li>
            </ul>
            <div class="nav-actions">
                <div class="admin-profile" style="display: flex; align-items: center; gap: 10px;">
                    <span id="admin-name" style="font-weight: 600; color: var(--text-gray);">Admin</span>
                    <button class="cart-icon" id="logout-btn" title="Logout">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <main class="admin-container">
        <div class="admin-header">
            <h1>Admin <span class="text-pink">Panel</span></h1>
            <div class="admin-tabs">
                <button class="tab-btn active" data-tab="orders">Orders</button>
                <button class="tab-btn" data-tab="menu">Menu & Categories</button>
            </div>
        </div>

        <!-- Orders Section -->
        <section class="admin-section active" id="orders-section">
            <div class="stats-grid">
                <div class="stat-card">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span class="stat-val" id="total-orders">0</span>
                    <span class="stat-label">Total Orders</span>
                </div>
                <div class="stat-card">
                    <i class="fa-solid fa-clock"></i>
                    <span class="stat-val" id="pending-orders">0</span>
                    <span class="stat-label">Pending</span>
                </div>
                <div class="stat-card">
                    <i class="fa-solid fa-circle-check"></i>
                    <span class="stat-val" id="completed-orders">0</span>
                    <span class="stat-label">Completed</span>
                </div>
                <div class="stat-card">
                    <i class="fa-solid fa-indian-rupee-sign"></i>
                    <span class="stat-val" id="total-revenue">Rs.0</span>
                    <span class="stat-label">Revenue</span>
                </div>
            </div>

            <div class="admin-orders-list" id="admin-orders-container">
                <!-- Orders will be injected here -->
                <p style="text-align: center; color: var(--text-gray); padding: 50px;">Loading orders...</p>
            </div>
        </section>

        <!-- Menu Section -->
        <section class="admin-section" id="menu-section">
            <div class="mgmt-grid">
                <!-- Forms Side -->
                <div class="mgmt-forms">
                    <div class="mgmt-form-card" style="margin-bottom: 20px;">
                        <h3 class="form-title"><i class="fa-solid fa-folder-plus"></i> Add Category</h3>
                        <form class="auth-form" id="category-form">
                            <div class="input-group">
                                <label>Category Name</label>
                                <div class="input-wrapper">
                                    <i class="fa-solid fa-tag"></i>
                                    <input type="text" id="cat-name" placeholder="e.g. Italian" required>
                                </div>
                            </div>
                            <button type="submit" class="btn-primary auth-btn">Create Category</button>
                        </form>
                    </div>

                    <div class="mgmt-form-card">
                        <h3 class="form-title" id="form-mode-title"><i class="fa-solid fa-plate-wheat"></i> Add Food Item</h3>
                        <form class="auth-form" id="subfood-form">
                            <input type="hidden" id="edit-item-id" value="">
                            <div class="input-group">
                                <label>Category</label>
                                <div class="status-select-wrapper">
                                    <select id="food-select" class="status-select"
                                        style="width: 100%; border-radius: 12px; background: #1a1a1a;" required>
                                        <option value="">Select Category</option>
                                    </select>
                                </div>
                            </div>
                            <div class="input-group">
                                <label>Item Name</label>
                                <div class="input-wrapper">
                                    <i class="fa-solid fa-utensils"></i>
                                    <input type="text" id="sub-name" placeholder="Margarita Pizza" required>
                                </div>
                            </div>
                            <div class="input-row">
                                <div class="input-group">
                                    <label>Price (Rs.)</label>
                                    <input type="number" step="0.01" id="sub-price" placeholder="12.99"
                                        style="width: 100%; background: #1a1a1a; border: 1px solid #333; padding: 12px; border-radius: 12px; color: white;"
                                        required>
                                </div>
                                <div class="input-group">
                                    <label>Type</label>
                                    <select id="sub-type" class="status-select"
                                        style="width: 100%; border-radius: 12px; background: #1a1a1a;">
                                        <option value="Veg">Veg</option>
                                        <option value="Non-Veg">Non-Veg</option>
                                    </select>
                                </div>
                            </div>
                            <div class="input-group">
                                <label>Image URL</label>
                                <input type="url" id="sub-img" placeholder="https://..."
                                    style="width: 100%; background: #1a1a1a; border: 1px solid #333; padding: 12px; border-radius: 12px; color: white;">
                            </div>
                            <div class="input-group">
                                <label>Description</label>
                                <textarea id="sub-desc" rows="2" placeholder="Tell users about this dish..."
                                    style="width: 100%; background: #1a1a1a; border: 1px solid #333; padding: 12px; border-radius: 12px; color: white; font-family: inherit;"></textarea>
                            </div>
                            <div style="display: flex; gap: 10px;">
                                <button type="submit" class="btn-primary auth-btn" id="subfood-submit-btn">Add to Menu</button>
                                <button type="button" class="btn-secondary" id="cancel-edit-btn" style="display: none; padding: 15px; border-radius: 12px; margin-top: 20px; width: 40%;">Cancel</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Display Side -->
                <div class="mgmt-display">
                    <h2 style="margin-bottom: 25px;">Current <span class="text-pink">Menu</span></h2>
                    <div class="mgmt-items-grid" id="admin-menu-grid">
                        <!-- Foods will be injected here -->
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import api from './js/api.js';

        // Security check
        async function checkAdmin() {
            try {
                const profile = await api.verifyToken();
                if (!profile) {
                    window.location.href = 'login.html';
                    return;
                }
                
                document.getElementById('admin-name').textContent = profile.userName || 'Admin';

                if (!profile.roles || !profile.roles.includes('ROLE_ADMIN')) {
                    alert('Access denied: Admin privileges required.');
                    window.location.href = 'home.html';
                }
            } catch (e) {
                console.error('Auth verify error:', e);
                window.location.href = 'login.html';
            }
        }

        checkAdmin();

        // Logout
        document.getElementById('logout-btn').addEventListener('click', () => api.logout());

        // Tab Switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(`${btn.dataset.tab}-section`).classList.add('active');
            });
        });
    </script>
    <script type="module" src="./js/admin.js"></script>
</body>

</html>
