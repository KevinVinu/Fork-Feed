services:
  - type: web
    name: forkfeed-app
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --chdir backend app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: forkfeed-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.0

databases:
  - name: forkfeed-db
    plan: free # Note: Render free databases expire after 90 days
