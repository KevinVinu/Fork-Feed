<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | ForkFeed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-message {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 16px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .auth-message.success {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.4);
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .auth-message.error {
            background: rgba(255, 45, 85, 0.15);
            border: 1px solid rgba(255, 45, 85, 0.4);
            color: #ff6b8a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="grid-background"></div>

    <header>
        <nav class="navbar">
            <div class="logo">Fork<span>Feed</span></div>
            <ul class="nav-links">
                <li><a href="home.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="orders.html">Orders</a></li>
                <li><a href="about.html">About us</a></li>
            </ul>
            <div class="nav-actions">
                <div class="cart-icon">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span class="cart-count">0</span>
                </div>
                <button class="btn-signup" onclick="window.location.href='login.html'">Login</button>
            </div>
        </nav>
    </header>

    <main class="auth-container">
        <div class="auth-card signup-card">
            <div class="auth-header">
                <h2>Create <span class="text-pink">Account</span></h2>
                <p>Join our community of food lovers.</p>
            </div>

            <!-- Feedback message -->
            <div class="auth-message" id="auth-msg"></div>

            <form class="auth-form" id="signup-form">
                <div class="input-row">
                    <div class="input-group">
                        <label>Full Name</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-id-card"></i>
                            <input type="text" id="su-name" placeholder="John Doe" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Username</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-user"></i>
                            <input type="text" id="su-username" placeholder="john_doe_321" required
                                autocomplete="username">
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="su-email" placeholder="email@example.com" required autocomplete="email">
                    </div>
                </div>

                <div class="input-group">
                    <label>Registration No</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-hashtag"></i>
                        <input type="text" id="su-regnum" placeholder="12******" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="su-password" placeholder="••••••••" required
                            autocomplete="new-password">
                    </div>
                </div>

                <button type="submit" class="btn-primary auth-btn" id="signup-btn">Register Now</button>
            </form>

            <p class="auth-switch">Already a member? <a href="login.html">Login here</a></p>
        </div>
    </main>

    <script type="module">
        import api from './js/api.js';

        const form = document.getElementById('signup-form');
        const msgEl = document.getElementById('auth-msg');
        const signupBtn = document.getElementById('signup-btn');

        function showMsg(type, icon, text) {
            msgEl.className = `auth-message ${type}`;
            msgEl.innerHTML = `<i class="fa-solid ${icon}"></i> ${text}`;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const fullName = document.getElementById('su-name').value.trim().split(' ');
            const username = document.getElementById('su-username').value.trim();
            const email = document.getElementById('su-email').value.trim();
            const regNum = document.getElementById('su-regnum').value.trim();
            const password = document.getElementById('su-password').value;

            if (!username || !email || !password || !regNum) {
                showMsg('error', 'fa-circle-exclamation', 'Please fill in all fields.');
                return;
            }

            if (password.length < 6) {
                showMsg('error', 'fa-circle-exclamation', 'Password must be at least 6 characters long.');
                return;
            }

            const userData = {
                firstName: fullName[0] || '',
                lastName: fullName.slice(1).join(' ') || '',
                userName: username,
                email: email,
                regNum: parseInt(regNum) || 0,
                password: password
            };

            signupBtn.disabled = true;
            signupBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Registering...';

            try {
                await api.signup(userData);

                showMsg('success', 'fa-circle-check', '🎉 Registration Successful! Redirecting to login...');
                form.reset();

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (error) {
                showMsg('error', 'fa-circle-xmark', error.message || 'Registration failed. Please try again.');
                signupBtn.disabled = false;
                signupBtn.innerHTML = 'Register Now';
            }
        });
    </script>
</body>

</html>
